name: cron-tick

on:
  schedule:
    # GitHub Actions cron runs at most every 5 minutes; the platform may delay it
    # by a few minutes during high load. That's fine for a personal task bot.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: cron-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /cron/tick
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$PUBLIC_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "PUBLIC_URL or CRON_SECRET secret not set in repo settings — skipping."
            exit 0
          fi
          # Wake Render service first (free Web Service may be sleeping).
          curl -fsS -m 60 "$PUBLIC_URL/healthz" >/dev/null || true
          # Now run the tick.
          curl -fsS -m 60 -X POST "$PUBLIC_URL/cron/tick" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
