name: ci

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: backend
        run: |
          pip install -e ".[dev]"
      - name: Lint
        working-directory: backend
        run: ruff check app/
      - name: Smoke import
        working-directory: backend
        env:
          BOT_TOKEN: fake
          PUBLIC_URL: https://x
          WEBAPP_URL: https://y
          DATABASE_URL: postgresql+asyncpg://u:p@h:5432/d
        run: python -c "from app.main import app; assert len(app.routes) > 0"

  webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install
        working-directory: webapp
        run: pnpm install --frozen-lockfile=false
      - name: Typecheck
        working-directory: webapp
        run: pnpm exec tsc -b
      - name: Build
        working-directory: webapp
        run: pnpm exec vite build
