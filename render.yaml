# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: tasksbot-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
